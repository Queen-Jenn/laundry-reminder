<!DOCTYPE html>
<html>
<head>
    <title>Laundry Reminder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <h1>Laundry Reminder</h1>

    <button onclick="startTimer(60)">
        Washer (60 min)
    </button>

    <button onclick="startTimer(45)">
        Dryer (45 min)
    </button>

    <p id="status"></p>

    <script>
        async function startTimer(minutes) {

    let status = document.getElementById("status");

    status.innerText = "Button clicked";

    try {

        if (!("Notification" in window)) {
            status.innerText = "Notifications not supported";
            return;
        }

        status.innerText = "Notifications supported";

        let permission = Notification.permission;

        status.innerText = "Permission: " + permission;

        if (permission !== "granted") {
            permission = await Notification.requestPermission();
            status.innerText = "Permission result: " + permission;
        }

        status.innerText = `Reminder set for ${minutes} minutes`;

    } catch (error) {

        status.innerText = "Error: " + error.message;
        console.error(error);

    }
}
    </script>
</body>
</html>
